# App
spring.application.name=smart-campus-api
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb+srv://dasun:12345@smart-campus.al7xwbr.mongodb.net/
spring.data.mongodb.database=smart_campus_db
spring.data.mongodb.auto-index-creation=false

# JWT
app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-value-here}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# OAuth2 Redirect URIs (update these for production)
app.oauth2.success-redirect-uri=${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:5173/oauth2/callback}
app.oauth2.failure-redirect-uri=${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:5173/login?error=oauth_failed}

# CORS Configuration (comma-separated list of allowed origins)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Forgot Password Reset Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.org.springframework=INFO
logging.level.org.springframework.security=INFO
logging.level.com.smartcampus=DEBUG